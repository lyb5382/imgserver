<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>츄뭉의 짤 갤러리</title>
    <style>
        body {
            background: #121212;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            color: #4CAF50;
        }

        .back-btn {
            background: #333;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            display: none;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            background: #555;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .folder {
            background: #1e1e1e;
            padding: 30px 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.2s;
        }

        .folder:hover {
            background: #2a2a2a;
            border-color: #4CAF50;
        }

        .folder-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .folder-name {
            font-weight: bold;
            font-size: 16px;
            word-break: break-all;
        }

        .image-card {
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .image-card p {
            margin: 10px 0 5px 0;
            font-size: 14px;
            color: #aaa;
        }

        .breadcrumb {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 10px;
        }

        /* 🔥 갤러리용 복사 버튼 CSS 추가 */
        .copy-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            width: 90%;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .copy-btn:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🗂️ 스텔스 갤러리</h1>
    </div>

    <div class="breadcrumb" id="breadcrumb">📂 최상위 폴더</div>
    <button class="back-btn" id="backBtn" onclick="goBack()">🔙 상위 폴더로</button>

    <div class="grid" id="gridContainer">
        <div style="color: #FFC107;">DB에서 짤 긁어오는 중... 존버...</div>
    </div>

    <script>
        let dbData = [];
        let tree = {};
        let currentLevel = 0;
        let selectedMain = '';
        let selectedSub = '';

        const grid = document.getElementById('gridContainer');
        const breadcrumb = document.getElementById('breadcrumb');
        const backBtn = document.getElementById('backBtn');

        async function fetchData() {
            try {
                const res = await fetch('/api/gallery');
                dbData = await res.json();
                buildTree();
                renderMainFolders();
            } catch (err) {
                grid.innerHTML = '<div style="color: red;">씨발 에러 났다. 서버 확인해봐.</div>';
            }
        }

        function buildTree() {
            tree = {};
            dbData.forEach(item => {
                const parts = item.customPath.split('/');
                if (parts.length === 3) {
                    const [main, sub, num] = parts;
                    if (!tree[main]) tree[main] = {};
                    if (!tree[main][sub]) tree[main][sub] = [];
                    tree[main][sub].push({ num, url: item.directUrl, fullPath: item.customPath });
                }
            });
        }

        function renderMainFolders() {
            currentLevel = 0;
            breadcrumb.innerText = '📂 최상위 폴더';
            backBtn.style.display = 'none';
            grid.innerHTML = '';

            Object.keys(tree).forEach(mainName => {
                const div = document.createElement('div');
                div.className = 'folder';
                div.innerHTML = `<div class="folder-icon">📁</div><div class="folder-name">${mainName}</div>`;
                div.onclick = () => renderSubFolders(mainName);
                grid.appendChild(div);
            });
            if (Object.keys(tree).length === 0) grid.innerHTML = '<div>아직 올린 짤이 하나도 없어 씨발!</div>';
        }

        function renderSubFolders(mainName) {
            currentLevel = 1;
            selectedMain = mainName;
            breadcrumb.innerText = `📂 ${mainName}`;
            backBtn.style.display = 'inline-block';
            grid.innerHTML = '';

            Object.keys(tree[mainName]).forEach(subName => {
                const div = document.createElement('div');
                div.className = 'folder';
                div.innerHTML = `<div class="folder-icon">📂</div><div class="folder-name">${subName}</div>`;
                div.onclick = () => renderImages(mainName, subName);
                grid.appendChild(div);
            });
        }

        function renderImages(mainName, subName) {
            currentLevel = 2;
            selectedSub = subName;
            breadcrumb.innerText = `📂 ${mainName} / 📂 ${subName}`;
            backBtn.style.display = 'inline-block';
            grid.innerHTML = '';

            // 숫자 순서대로 정렬되게 살짝 손봄
            const sortedImages = tree[mainName][subName].sort((a, b) => a.num.localeCompare(b.num, undefined, { numeric: true }));

            sortedImages.forEach(img => {
                const finalUrl = `https://edena.cloud/${img.fullPath}`;
                const div = document.createElement('div');
                div.className = 'image-card';

                // 🔥 대망의 복사 버튼 장착 완료
                div.innerHTML = `
          <a href="${finalUrl}" target="_blank" style="width: 100%;">
            <img src="${img.url}" loading="lazy" alt="짤">
          </a>
          <p># ${img.num}</p>
          <button class="copy-btn" onclick="copyGalleryLink('${finalUrl}')">🔗 링크 복사</button>
        `;
                grid.appendChild(div);
            });
        }

        // 🔥 클립보드 복사 함수 추가
        window.copyGalleryLink = function (url) {
            navigator.clipboard.writeText(url).then(() => {
                alert('복사 완료!');
            }).catch(() => {
                alert('복사 실패함 좆됨.');
            });
        }

        function goBack() {
            if (currentLevel === 2) renderSubFolders(selectedMain);
            else if (currentLevel === 1) renderMainFolders();
        }

        fetchData();
    </script>
</body>

</html>
